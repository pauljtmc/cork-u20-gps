<script>
  // This function runs when the page loads
  window.addEventListener('load', function() {
    refreshAllData();
  });

  function refreshAllData() {
    showStatus('busy', 'Fetching live data...');

    // Pull data from "Load Monitor" tab
    google.script.run
      .withSuccessHandler(function(data) {
        renderLoadMonitor(data); // Pass data to your existing table-building functions
        showStatus('ok', 'Load Monitor Synced');
      })
      .withFailureHandler(function(err) {
        showStatus('err', 'Failed to load: ' + err.message);
      })
      .getSheetData('Load Monitor');

    // Pull data from "Speed Rankings" tab
    google.script.run
      .withSuccessHandler(function(data) {
        renderSpeedRankings(data);
      })
      .getSheetData('Speed Rankings');
  }

  // Example: Mapping your live data to your HTML components
  function renderLoadMonitor(data) {
    const container = document.getElementById('loadMonitorContainer');
    if (!container) return;
    
    // Clear and rebuild using the professional styling from your file
    let html = '';
    data.forEach(player => {
      html += `
        <div class="load-row">
          <div class="load-player">${player.Name}</div>
          <div class="load-cell">${player.DailyLoad}</div>
          <div class="load-cell"><span class="ac-badge ac-opt">${player.Status}</span></div>
        </div>
      `;
    });
    container.innerHTML = html;
  }

  function showStatus(type, msg) {
    const dot = document.querySelector('.ss-dot');
    const label = document.querySelector('.ss-label');
    if (dot && label) {
      dot.className = 'ss-dot ss-' + type;
      label.innerText = msg;
    }
  }
</script>
